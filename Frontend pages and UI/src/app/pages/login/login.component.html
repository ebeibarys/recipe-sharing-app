<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🍴 RecipeShare</div>

    <div class="auth-tabs">
      <button [class.active]="mode === 'login'" (click)="switchMode('login')">Войти</button>
      <button [class.active]="mode === 'register'" (click)="switchMode('register')">Регистрация</button>
    </div>

    @if (error) {
      <div class="error-msg">⚠️ {{ error }}</div>
    }

    <!-- LOGIN FORM -->
    @if (mode === 'login') {
      <div class="form-group">
        <label>Имя пользователя</label>
        <input type="text" placeholder="username" [(ngModel)]="loginForm.username" (keyup.enter)="onLogin()" />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" placeholder="••••••••" [(ngModel)]="loginForm.password" (keyup.enter)="onLogin()" />
      </div>
      <button class="btn-submit" (click)="onLogin()" [disabled]="loading">
        {{ loading ? 'Входим...' : 'Войти' }}
      </button>
    }

    <!-- REGISTER FORM -->
    @if (mode === 'register') {
      <div class="form-group">
        <label>Имя пользователя</label>
        <input type="text" placeholder="username" [(ngModel)]="registerForm.username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="email@example.com" [(ngModel)]="registerForm.email" />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" placeholder="минимум 6 символов" [(ngModel)]="registerForm.password" />
      </div>
      <div class="form-group">
        <label>Подтвердите пароль</label>
        <input type="password" placeholder="повторите пароль" [(ngModel)]="registerForm.confirmPassword" (keyup.enter)="onRegister()" />
      </div>
      <button class="btn-submit" (click)="onRegister()" [disabled]="loading">
        {{ loading ? 'Регистрируем...' : 'Создать аккаунт' }}
      </button>
    }

    <p class="switch-hint">
      @if (mode === 'login') {
        Нет аккаунта? <a (click)="switchMode('register')">Зарегистрируйтесь</a>
      } @else {
        Уже есть аккаунт? <a (click)="switchMode('login')">Войдите</a>
      }
    </p>
  </div>
</div>
